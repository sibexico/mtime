name: Release Tests and Badge Update

on:
  push:

permissions:
  contents: write

jobs:
  test-and-update-badges:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Detect VERSION file change and read release metadata
        id: release_meta
        shell: bash
        run: |
          before_sha="${{ github.event.before }}"
          after_sha="${{ github.sha }}"

          version_changed="false"
          if [[ "$before_sha" == "0000000000000000000000000000000000000000" ]]; then
            if git cat-file -e "$after_sha:VERSION" 2>/dev/null; then
              version_changed="true"
            fi
          else
            if git diff --name-only "$before_sha" "$after_sha" | grep -qx "VERSION"; then
              version_changed="true"
            fi
          fi

          echo "version_changed=$version_changed" >> "$GITHUB_OUTPUT"

          if [[ "$version_changed" != "true" ]]; then
            echo "VERSION was not changed in this push. Skipping release flow."
            exit 0
          fi

          version_value="$(tr -d '\r' < VERSION | sed -e '1q' | sed -e 's/[[:space:]]*$//')"
          if [[ -z "$version_value" ]]; then
            echo "VERSION file is empty."
            exit 1
          fi

          commit_body="${{ github.event.head_commit.message }}"

          {
            echo "version=$version_value"
            echo "commit_body<<__COMMIT_BODY__"
            echo "$commit_body"
            echo "__COMMIT_BODY__"
          } >> "$GITHUB_OUTPUT"

          echo "Release version detected from VERSION: $version_value"
          echo "Commit description captured for release body."

      - name: Setup Go
        if: steps.release_meta.outputs.version_changed == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests with coverage
        if: steps.release_meta.outputs.version_changed == 'true'
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic

      - name: Build badges and update README
        if: steps.release_meta.outputs.version_changed == 'true'
        id: badges
        shell: bash
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ "${{ steps.tests.outcome }}" == "success" ]]; then
            test_status="Passed"
            test_color="green"
          else
            test_status="Failed"
            test_color="red"
          fi

          coverage="0.0"
          if [[ -f coverage.out ]]; then
            coverage="$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')"
          fi

          # Normalize to one decimal for stable badge output.
          coverage="$(awk -v c="$coverage" 'BEGIN {printf "%.1f", c + 0}')"

          if awk -v c="$coverage" 'BEGIN {exit !(c >= 70)}'; then
            coverage_color="green"
          elif awk -v c="$coverage" 'BEGIN {exit !(c >= 50)}'; then
            coverage_color="yellow"
          else
            coverage_color="red"
          fi

          coverage_label="${coverage}%25"
          test_badge="https://img.shields.io/badge/Tests-${test_status}-${test_color}?labelColor=gray&logo=github"
          coverage_badge="https://img.shields.io/badge/Tests%20Coverage-${coverage_label}-${coverage_color}?labelColor=gray&logo=gitextensions"

          test_line="[![Tests passed](${test_badge})](${RUN_URL})"
          coverage_line=" [![Tests coverage](${coverage_badge})](${RUN_URL})"

          awk -v test_line="$test_line" -v coverage_line="$coverage_line" '
            {
              if ($0 ~ /\[Tests passed\]/) {
                print test_line
                next
              }
              if ($0 ~ /\[Tests coverage\]/) {
                print coverage_line
                next
              }
              print
            }
          ' README.md > README.tmp && mv README.tmp README.md

          echo "test_status=${test_status}" >> "$GITHUB_OUTPUT"
          echo "coverage=${coverage}" >> "$GITHUB_OUTPUT"

      - name: Commit README badge updates
        if: steps.release_meta.outputs.version_changed == 'true'
        shell: bash
        run: |
          if git diff --quiet -- README.md; then
            echo "README.md already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "docs: update release test and coverage badges"
            git push
          fi

      - name: Refresh local branch after README push
        if: steps.release_meta.outputs.version_changed == 'true'
        id: refresh
        shell: bash
        run: |
          git pull --ff-only origin "${{ github.ref_name }}"
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create tagged release
        if: steps.release_meta.outputs.version_changed == 'true' && steps.tests.outcome == 'success'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_meta.outputs.version }}
          target_commitish: ${{ steps.refresh.outputs.release_sha }}
          generate_release_notes: false
          body: ${{ steps.release_meta.outputs.commit_body }}

      - name: Fail job when tests failed
        if: steps.release_meta.outputs.version_changed == 'true' && steps.tests.outcome != 'success'
        shell: bash
        run: |
          echo "Tests failed. Badges were updated to reflect the failed run, and release was not created."
          exit 1
