name: Release Tests and Badge Update

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  test-and-update-badges:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests with coverage
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic

      - name: Build badges and update README
        id: badges
        shell: bash
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ "${{ steps.tests.outcome }}" == "success" ]]; then
            test_status="Passed"
            test_color="green"
          else
            test_status="Failed"
            test_color="red"
          fi

          coverage="0.0"
          if [[ -f coverage.out ]]; then
            coverage="$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')"
          fi

          # Normalize to one decimal for stable badge output.
          coverage="$(awk -v c="$coverage" 'BEGIN {printf "%.1f", c + 0}')"

          if awk -v c="$coverage" 'BEGIN {exit !(c >= 70)}'; then
            coverage_color="green"
          elif awk -v c="$coverage" 'BEGIN {exit !(c >= 50)}'; then
            coverage_color="yellow"
          else
            coverage_color="red"
          fi

          coverage_label="${coverage}%25"
          test_badge="https://img.shields.io/badge/Tests-${test_status}-${test_color}?labelColor=gray&logo=github"
          coverage_badge="https://img.shields.io/badge/Tests%20Coverage-${coverage_label}-${coverage_color}?labelColor=gray&logo=gitextensions"

          sed -E -i "s|^[[:space:]]*!\\[Tests passed\\].*$|[![Tests passed](${test_badge})](${RUN_URL})|" README.md
          sed -E -i "s|^[[:space:]]*!\\[Tests coverage\\].*$|[![Tests coverage](${coverage_badge})](${RUN_URL})|" README.md

          echo "test_status=${test_status}" >> "$GITHUB_OUTPUT"
          echo "coverage=${coverage}" >> "$GITHUB_OUTPUT"

      - name: Commit README badge updates
        shell: bash
        run: |
          if git diff --quiet -- README.md; then
            echo "README.md already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update release test and coverage badges"
          git push

      - name: Fail job when tests failed
        if: steps.tests.outcome != 'success'
        shell: bash
        run: |
          echo "Tests failed. Badges were updated to reflect the failed run."
          exit 1
